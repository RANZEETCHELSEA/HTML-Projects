<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Card UI Design</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="profile-card">
      <div class="image">
        <img src="profile.jpg" alt="" class="profile-img" />
      </div>

      <div class="text-data">
        <span class="name">RanzeetChelsea</span>
        <span class="job">Freelancer/Content Creator</span>
      </div>

      <div class="media-buttons">
        <img src="fb.png" style="background: powderblue" alt="facebook" />
        <img src="insta.png" style="background: red" alt="instagram" />
        <img src="twitter.png" style="background: white" alt="twitter" />
        <img src="youtube.png" style="background: red" alt="youtube" />
        <img src="github.png" style="background: whitesmoke" alt="gitHub" />
      </div>

      <div class="buttons">
        <button class="button">Like</button>
        <button class="button">Share</button>
        <button class="button">Subscribe</button>
        <button class="button">Message</button>
      </div>
    </div>
  </body>
</html>
